<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Diane!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ff6b9d, #c44dff, #6e8efb);
    font-family: 'Georgia', serif;
    overflow: hidden;
  }
  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 500px;
    animation: float 3s ease-in-out infinite;
  }
  .cake { font-size: 80px; margin-bottom: 20px; }
  h1 {
    font-size: 42px;
    background: linear-gradient(135deg, #ff6b9d, #c44dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .name {
    font-size: 56px;
    background: linear-gradient(135deg, #c44dff, #6e8efb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-style: italic;
    margin-bottom: 20px;
  }
  .message {
    font-size: 20px;
    color: #555;
    line-height: 1.6;
  }
  .sparkles { font-size: 30px; margin-top: 20px; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .confetti {
    position: fixed;
    font-size: 24px;
    animation: fall linear infinite;
    opacity: 0.8;
  }
  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday</h1>
    <div class="name">Diane!</div>
    <p class="message">Wishing you a wonderful day filled with joy, love, and all the happiness you deserve!</p>
    <div class="sparkles">🎉 🎈 🥂 🎁 🎊</div>
  </div>
  <script>
    const emojis = ['🎉','🎊','✨','🌟','💖','🎈','🎁','⭐'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (3 + Math.random() * 4) + 's';
      el.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(el);
    }
  </script>
</body>
</html>
