<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>French Tutor 🇫🇷</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --card-alt: #1a2744;
  --blue: #4a7fc4;
  --white: #e8e8e8;
  --red: #c44a4a;
  --gold: #f0c040;
  --masc: #4a7fc4;
  --fem: #c44a4a;
  --text: #e8e8e8;
  --text-dim: #8899aa;
  --success: #4caf50;
  --error: #e74c3c;
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  padding-bottom: calc(40px + var(--safe-bottom));
}
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #0f1527, #16213e);
  padding: calc(var(--safe-top) + 8px) 16px 10px;
  border-bottom: 2px solid var(--blue);
  backdrop-filter: blur(10px);
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.header-title { font-size: 1.1em; font-weight: 700; }
.header-title .flag { font-size: 1.3em; }
.header-stats { display: flex; gap: 14px; font-size: 0.82em; color: var(--text-dim); flex-wrap: wrap; }
.header-stats span { white-space: nowrap; }
.stat-val { color: var(--gold); font-weight: 600; }
.gear-btn { background: none; border: none; color: var(--text-dim); font-size: 1.4em; cursor: pointer; padding: 4px; }
main { max-width: 600px; margin: 0 auto; padding: 16px; }
.section-header {
  font-size: 1.3em; font-weight: 700; margin: 24px 0 12px;
  padding-bottom: 6px; border-bottom: 2px solid var(--gold);
  display: flex; align-items: center; gap: 8px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid var(--blue);
}
.card.fem { border-left-color: var(--fem); }
.card.rule { border-left-color: var(--gold); background: linear-gradient(135deg, #1e2a45, #16213e); }
.card.practice { border-left-color: var(--success); }
.card-label {
  font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dim); margin-bottom: 6px;
}
.french {
  font-size: 1.25em; font-weight: 600; margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.english { color: var(--text-dim); font-size: 0.95em; }
.speak-btn {
  background: none; border: none; font-size: 1.1em; cursor: pointer;
  padding: 4px 6px; border-radius: 6px; color: var(--blue); flex-shrink: 0;
}
.speak-btn:active { background: rgba(74,127,196,0.2); }
.example-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.example-row:last-child { border-bottom: none; }
.example-fr { font-weight: 600; flex: 1; font-size: 1.05em; }
.example-en { color: var(--text-dim); font-size: 0.9em; flex: 1; }
.masc { color: var(--masc); }
.fem { color: var(--fem); }
.gold { color: var(--gold); }
.rule-box {
  background: rgba(240,192,64,0.08);
  border: 1px solid rgba(240,192,64,0.3);
  border-radius: var(--radius);
  padding: 14px; margin: 12px 0;
}
.rule-box .rule-title { color: var(--gold); font-weight: 700; margin-bottom: 4px; font-size: 0.9em; }
/* Flash cards */
.flash-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  margin-bottom: 12px; text-align: center; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
  min-height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.flash-card.revealed { background: var(--card-alt); }
.flash-card .fc-french { font-size: 1.4em; font-weight: 700; margin-bottom: 8px; }
.flash-card .fc-english { color: var(--gold); font-size: 1.1em; display: none; margin-top: 8px; }
.flash-card.revealed .fc-english { display: block; }
.flash-card .fc-hint { color: var(--text-dim); font-size: 0.8em; margin-top: 8px; }
.flash-card.revealed .fc-hint { display: none; }
.rate-btns { display: flex; gap: 8px; margin-top: 10px; display: none; }
.flash-card.revealed + .rate-btns, .rate-btns.show { display: flex !important; }
.rate-btn {
  flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 1em;
  cursor: pointer; font-weight: 600; color: white;
}
.rate-btn.hard { background: var(--error); }
.rate-btn.ok { background: var(--blue); }
.rate-btn.easy { background: var(--success); }
/* Quiz */
.quiz-q {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-bottom: 14px; border-left: 4px solid var(--blue);
}
.quiz-q .q-num { color: var(--gold); font-weight: 700; font-size: 0.85em; margin-bottom: 6px; }
.quiz-q .q-text { font-size: 1.05em; margin-bottom: 12px; font-weight: 500; }
.mcq-opts { display: flex; flex-direction: column; gap: 8px; }
.mcq-opt {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 12px 14px; cursor: pointer; font-size: 1em;
  transition: all 0.2s; color: var(--text);
}
.mcq-opt:active, .mcq-opt.selected { border-color: var(--blue); background: rgba(74,127,196,0.15); }
.mcq-opt.correct { border-color: var(--success); background: rgba(76,175,80,0.15); color: var(--success); }
.mcq-opt.wrong { border-color: var(--error); background: rgba(231,76,60,0.15); color: var(--error); }
.fill-input {
  width: 100%; padding: 12px; border-radius: 8px; font-size: 1.05em;
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
  color: var(--text); outline: none;
}
.fill-input:focus { border-color: var(--blue); }
.fill-input.correct { border-color: var(--success); }
.fill-input.wrong { border-color: var(--error); }
.correction { color: var(--success); font-size: 0.9em; margin-top: 6px; display: none; }
.btn-primary {
  width: 100%; padding: 16px; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--blue), #3a6fb4);
  color: white; font-size: 1.1em; font-weight: 700; cursor: pointer;
  margin-top: 16px; transition: transform 0.1s;
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  width: 100%; padding: 14px; border: 2px solid var(--blue); border-radius: var(--radius);
  background: transparent; color: var(--blue); font-size: 1em; font-weight: 600;
  cursor: pointer; margin-top: 10px;
}
/* Results */
.results-card {
  background: var(--card); border-radius: var(--radius); padding: 20px;
  text-align: center; border: 2px solid var(--gold); margin-bottom: 16px;
}
.results-score { font-size: 2.5em; font-weight: 800; color: var(--gold); }
.results-label { color: var(--text-dim); font-size: 0.9em; margin-top: 4px; }
.results-details { text-align: left; margin-top: 16px; }
.results-details p { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
/* Settings panel */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: none; justify-content: center; align-items: flex-end;
}
.settings-overlay.open { display: flex; }
.settings-panel {
  background: var(--card); border-radius: 16px 16px 0 0; padding: 24px 16px calc(16px + var(--safe-bottom));
  width: 100%; max-width: 600px; max-height: 70vh; overflow-y: auto;
}
.settings-panel h3 { margin-bottom: 16px; }
.settings-panel button { margin-bottom: 8px; }
/* Done state */
.done-card {
  background: var(--card); border-radius: var(--radius); padding: 40px 20px;
  text-align: center; margin: 40px 0;
}
.done-card .done-emoji { font-size: 3em; margin-bottom: 12px; }
.done-card .done-text { font-size: 1.2em; color: var(--text-dim); }
/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease-out; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title"><span class="flag">🇫🇷</span> <span id="headerTopic">French Tutor</span></div>
    <button class="gear-btn" id="gearBtn">⚙️</button>
  </div>
  <div class="header-stats">
    <span>📅 Jour <span class="stat-val" id="dayNum">1</span></span>
    <span>🔥 <span class="stat-val" id="streak">0</span></span>
    <span>📊 <span class="stat-val" id="accuracy">--%</span></span>
  </div>
</header>

<main id="mainContent"></main>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>⚙️ Settings</h3>
    <button class="btn-secondary" id="exportBtn">📤 Export Data (JSON)</button>
    <button class="btn-secondary" id="importBtn">📥 Import Data</button>
    <input type="file" id="importFile" accept=".json" class="hidden">
    <button class="btn-secondary" id="resetBtn" style="border-color:var(--red);color:var(--red);">🗑️ Reset All Progress</button>
    <button class="btn-primary" id="closeSettings" style="margin-top:20px;">Close</button>
  </div>
</div>

// ═══════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════
const STORAGE_KEY = 'french_tutor_srs';

function today() { return new Date().toISOString().split('T')[0]; }

function daysBetween(d1, d2) {
  return Math.floor((new Date(d2) - new Date(d1)) / 86400000);
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function getDefaultState() {
  return {
    cards: {},
    lesson_history: [],
    current_topic_index: 0,
    current_position: 0,
    weaknesses: {},
    first_day: today(),
    last_active: null,
    streak: 0,
    total_correct: 0,
    total_wrong: 0
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function initCards(state, topicIndex) {
  const topic = CURRICULUM[topicIndex];
  if (!topic) return;
  topic.cards.forEach((c, i) => {
    const id = `${topic.id}_${i}`;
    if (!state.cards[id]) {
      state.cards[id] = {
        id, topic: topic.id, category: topic.category,
        french: c.fr, english: c.en,
        easiness: 2.5, interval: 1, repetitions: 0,
        next_review: addDays(today(), 1),
        last_score: null, times_correct: 0, times_wrong: 0
      };
    }
  });
}

// ═══════════════════════════════════════
// SM-2 ALGORITHM
// ═══════════════════════════════════════
function sm2Update(card, score) {
  if (score >= 3) {
    card.repetitions++;
    if (card.repetitions === 1) card.interval = 1;
    else if (card.repetitions === 2) card.interval = 6;
    else card.interval = Math.round(card.interval * card.easiness);
    card.easiness = Math.max(1.3, card.easiness + 0.1 - (5 - score) * (0.08 + (5 - score) * 0.02));
    card.times_correct++;
  } else {
    card.repetitions = 0;
    card.interval = 1;
    card.times_wrong++;
  }
  card.last_score = score;
  card.next_review = addDays(today(), card.interval);
}

// ═══════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) u.voice = frVoice;
  speechSynthesis.speak(u);
}

// preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// RENDERING
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
const main = () => $('mainContent');

let APP_STATE;
let QUIZ_DATA = [];
let REVIEW_CARDS = [];
let QUIZ_SUBMITTED = false;
let TODAY_DONE = false;

function init() {
  APP_STATE = loadState() || getDefaultState();

  // Update streak
  const t = today();
  if (APP_STATE.last_active) {
    const diff = daysBetween(APP_STATE.last_active, t);
    if (diff > 1) APP_STATE.streak = 0;
  }

  // Init cards for current + previous topics
  for (let i = 0; i <= Math.min(APP_STATE.current_topic_index, CURRICULUM.length - 1); i++) {
    initCards(APP_STATE, i);
  }

  // Check if already done today
  const todayLessons = APP_STATE.lesson_history.filter(h => h.date === t);
  TODAY_DONE = todayLessons.length > 0;

  // Get review cards
  REVIEW_CARDS = Object.values(APP_STATE.cards).filter(c => c.next_review <= t && c.last_score !== null);

  updateHeader();
  render();
  setupDelegation();
  saveState(APP_STATE);
}

function updateHeader() {
  const dayNum = Math.max(1, daysBetween(APP_STATE.first_day, today()) + 1);
  $('dayNum').textContent = dayNum;
  $('streak').textContent = APP_STATE.streak;
  const total = APP_STATE.total_correct + APP_STATE.total_wrong;
  $('accuracy').textContent = total > 0 ? Math.round(APP_STATE.total_correct / total * 100) + '%' : '--%';

  const ti = APP_STATE.current_topic_index;
  const topic = CURRICULUM[Math.min(ti, CURRICULUM.length - 1)];
  $('headerTopic').textContent = `Jour ${dayNum} • ${topic ? topic.name : 'Complete!'}`;
}

function render() {
  const ti = APP_STATE.current_topic_index;
  const pos = APP_STATE.current_position;

  if (ti >= CURRICULUM.length && REVIEW_CARDS.length === 0) {
    main().innerHTML = `<div class="done-card fade-in">
      <div class="done-emoji">🎉🇫🇷</div>
      <div class="done-text">Félicitations ! You've completed all A1 lessons!<br>Come back tomorrow for review cards.</div>
    </div>`;
    return;
  }

  if (TODAY_DONE && REVIEW_CARDS.length === 0) {
    main().innerHTML = `<div class="done-card fade-in">
      <div class="done-emoji">✅</div>
      <div class="done-text">All caught up for today!<br>Come back tomorrow for your next lesson.</div>
      <p style="color:var(--text-dim);margin-top:12px;font-size:0.9em;">Next: ${ti < CURRICULUM.length ? CURRICULUM[ti].name : 'Reviews'}</p>
    </div>`;
    return;
  }

  let html = '';

  // Lesson section
  if (!TODAY_DONE && ti < CURRICULUM.length) {
    const topic = CURRICULUM[ti];
    const lesson = topic.positions[pos];
    html += renderLesson(lesson, topic, pos);
  }

  // Review section
  if (REVIEW_CARDS.length > 0) {
    html += renderReview();
  }

  // Quiz section
  html += renderQuiz();

  main().innerHTML = html;
}

function renderLesson(lesson, topic, pos) {
  const posLabels = ['Introduction', 'Deep Dive', 'Practice'];
  let h = `<div class="section-header fade-in">📖 ${posLabels[pos]}: ${lesson.title}</div>`;
  h += `<p style="color:var(--text-dim);margin-bottom:16px;" class="fade-in">${lesson.subtitle}</p>`;

  if (lesson.rules) {
    lesson.rules.forEach(rule => {
      h += `<div class="card rule fade-in"><div class="card-label">Rule</div><p style="margin-bottom:8px;">${rule.text}</p>`;
      if (rule.examples) {
        rule.examples.forEach(ex => {
          h += `<div class="example-row">
            <span class="example-fr">${ex.fr}</span>
            <button class="speak-btn" data-text="${ex.fr.replace(/"/g, '&quot;')}">🔊</button>
            <span class="example-en">${ex.en}</span>
          </div>`;
        });
      }
      h += `</div>`;
    });
  }

  if (lesson.sentences) {
    h += `<div class="card practice fade-in"><div class="card-label">Example Sentences</div>`;
    lesson.sentences.forEach(s => {
      h += `<div class="example-row">
        <span class="example-fr">${s.fr}</span>
        <button class="speak-btn" data-text="${s.fr.replace(/"/g, '&quot;')}">🔊</button>
        <span class="example-en">${s.en}</span>
      </div>`;
    });
    h += `</div>`;
  }

  if (lesson.practice) {
    h += `<div class="card practice fade-in"><div class="card-label">Quick Practice</div>`;
    lesson.practice.forEach(p => {
      h += `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
        <p style="font-weight:600;">${p.prompt}</p>
        <p style="color:var(--text-dim);font-size:0.85em;">Answer: <span class="gold">${p.answer}</span> — ${p.hint}</p>
      </div>`;
    });
    h += `</div>`;
  }

  if (lesson.keyRule) {
    h += `<div class="rule-box fade-in"><div class="rule-title">💡 Key Rule</div><p>${lesson.keyRule}</p></div>`;
  }

  return h;
}

function renderReview() {
  let h = `<div class="section-header fade-in">🔄 Review (${REVIEW_CARDS.length} cards due)</div>`;
  REVIEW_CARDS.forEach((card, i) => {
    h += `<div class="flash-card fade-in" data-fc="${i}">
      <div class="fc-french">${card.french} <button class="speak-btn" data-text="${card.french.replace(/"/g, '&quot;')}">🔊</button></div>
      <div class="fc-hint">Tap to reveal</div>
      <div class="fc-english">${card.english}</div>
    </div>
    <div class="rate-btns" data-rate-for="${i}">
      <button class="rate-btn hard" data-rate="1" data-card-idx="${i}">😟 Hard</button>
      <button class="rate-btn ok" data-rate="3" data-card-idx="${i}">😐 OK</button>
      <button class="rate-btn easy" data-rate="5" data-card-idx="${i}">😊 Easy</button>
    </div>`;
  });
  return h;
}

function generateQuiz() {
  QUIZ_DATA = [];
  const ti = APP_STATE.current_topic_index;
  const topic = ti < CURRICULUM.length ? CURRICULUM[ti] : null;

  // Collect cards for quiz
  let quizCards = [];
  if (topic) {
    topic.cards.forEach((c, i) => {
      quizCards.push({ ...c, id: `${topic.id}_${i}`, topic: topic.id, category: topic.category });
    });
  }
  REVIEW_CARDS.forEach(c => {
    if (!quizCards.find(qc => qc.fr === c.french)) {
      quizCards.push({ fr: c.french, en: c.english, id: c.id, topic: c.topic, category: c.category });
    }
  });

  // Shuffle
  quizCards = quizCards.sort(() => Math.random() - 0.5);

  // Generate 8 questions (mix of types)
  const numQ = Math.min(8, Math.max(5, quizCards.length));
  const types = ['mcq', 'fill', 'translate', 'mcq'];

  for (let i = 0; i < numQ; i++) {
    const card = quizCards[i % quizCards.length];
    const type = types[i % types.length];

    if (type === 'mcq') {
      // MCQ: English → French
      const correct = card.fr;
      const distractors = quizCards
        .filter(c => c.fr !== correct)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3)
        .map(c => c.fr);
      const opts = [correct, ...distractors].sort(() => Math.random() - 0.5);
      QUIZ_DATA.push({
        type: 'mcq', question: `What is "${card.en}" in French?`,
        options: opts, answer: correct, cardId: card.id
      });
    } else if (type === 'fill') {
      // Fill in blank — extract first word
      const parts = card.fr.split(' ');
      if (parts.length >= 2) {
        const blank = parts[0];
        const rest = parts.slice(1).join(' ');
        QUIZ_DATA.push({
          type: 'fill', question: `Fill in: ___ ${rest}`,
          hint: card.en, answer: blank.toLowerCase(), cardId: card.id
        });
      } else {
        // Fallback to translate
        QUIZ_DATA.push({
          type: 'translate', question: `Translate to French: "${card.en}"`,
          answer: card.fr.toLowerCase(), cardId: card.id
        });
      }
    } else {
      // Translate English → French
      QUIZ_DATA.push({
        type: 'translate', question: `Translate to French: "${card.en}"`,
        answer: card.fr.toLowerCase(), cardId: card.id
      });
    }
  }
}

function renderQuiz() {
  generateQuiz();
  if (QUIZ_DATA.length === 0) return '';

  let h = `<div class="section-header fade-in">✏️ Quiz</div>`;

  QUIZ_DATA.forEach((q, i) => {
    h += `<div class="quiz-q fade-in" data-qi="${i}">
      <div class="q-num">Question ${i + 1} / ${QUIZ_DATA.length}</div>
      <div class="q-text">${q.question}</div>`;

    if (q.type === 'mcq') {
      h += `<div class="mcq-opts">`;
      q.options.forEach((opt, oi) => {
        h += `<div class="mcq-opt" data-qi="${i}" data-oi="${oi}" data-val="${opt.replace(/"/g, '&quot;')}">${opt}</div>`;
      });
      h += `</div>`;
    } else {
      h += `<input class="fill-input" data-qi="${i}" type="text" placeholder="${q.type === 'fill' ? 'Type the missing word...' : 'Type your answer...'}" autocomplete="off" autocapitalize="none" spellcheck="false">`;
      if (q.hint) h += `<p style="color:var(--text-dim);font-size:0.8em;margin-top:4px;">Hint: ${q.hint}</p>`;
    }
    h += `<div class="correction" data-corr="${i}"></div></div>`;
  });

  h += `<button class="btn-primary" id="submitQuiz">Submit Quiz</button>`;
  return h;
}

// ═══════════════════════════════════════
// EVENT HANDLING (delegation)
// ═══════════════════════════════════════
function setupDelegation() {
  document.body.addEventListener('click', e => {
    const t = e.target;

    // Speak buttons
    if (t.classList.contains('speak-btn') || t.closest('.speak-btn')) {
      e.stopPropagation();
      const btn = t.classList.contains('speak-btn') ? t : t.closest('.speak-btn');
      const text = btn.getAttribute('data-text');
      if (text) speak(text);
      return;
    }

    // Flash card reveal
    const fc = t.closest('.flash-card');
    if (fc && !fc.classList.contains('revealed')) {
      fc.classList.add('revealed');
      const idx = fc.getAttribute('data-fc');
      const rateDiv = document.querySelector(`.rate-btns[data-rate-for="${idx}"]`);
      if (rateDiv) rateDiv.classList.add('show');
      return;
    }

    // Rate buttons
    if (t.classList.contains('rate-btn')) {
      const score = parseInt(t.getAttribute('data-rate'));
      const idx = parseInt(t.getAttribute('data-card-idx'));
      const card = REVIEW_CARDS[idx];
      if (card) {
        const stateCard = APP_STATE.cards[card.id];
        if (stateCard) {
          sm2Update(stateCard, score);
          saveState(APP_STATE);
        }
      }
      // Visual feedback
      const parent = t.parentElement;
      parent.innerHTML = `<span style="color:var(--success);font-weight:600;">✅ Rated! Next review: ${APP_STATE.cards[card.id]?.next_review || 'soon'}</span>`;
      return;
    }

    // MCQ options
    if (t.classList.contains('mcq-opt') && !QUIZ_SUBMITTED) {
      const qi = t.getAttribute('data-qi');
      document.querySelectorAll(`.mcq-opt[data-qi="${qi}"]`).forEach(o => o.classList.remove('selected'));
      t.classList.add('selected');
      return;
    }

    // Submit quiz
    if (t.id === 'submitQuiz' || t.closest('#submitQuiz')) {
      submitQuiz();
      return;
    }

    // Done button
    if (t.id === 'doneBtn' || t.closest('#doneBtn')) {
      TODAY_DONE = true;
      REVIEW_CARDS = [];
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    // Settings
    if (t.id === 'gearBtn' || t.closest('#gearBtn')) {
      $('settingsOverlay').classList.add('open');
      return;
    }
    if (t.id === 'closeSettings') {
      $('settingsOverlay').classList.remove('open');
      return;
    }
    if (t.id === 'settingsOverlay' && t === e.target) {
      $('settingsOverlay').classList.remove('open');
      return;
    }
    if (t.id === 'exportBtn') {
      exportData();
      return;
    }
    if (t.id === 'importBtn') {
      $('importFile').click();
      return;
    }
    if (t.id === 'resetBtn') {
      if (confirm('Reset ALL progress? This cannot be undone!')) {
        localStorage.removeItem(STORAGE_KEY);
        APP_STATE = getDefaultState();
        saveState(APP_STATE);
        TODAY_DONE = false;
        REVIEW_CARDS = [];
        init();
        $('settingsOverlay').classList.remove('open');
      }
      return;
    }
  });

  $('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        APP_STATE = JSON.parse(ev.target.result);
        saveState(APP_STATE);
        init();
        $('settingsOverlay').classList.remove('open');
        alert('Data imported successfully!');
      } catch(err) {
        alert('Invalid file!');
      }
    };
    reader.readAsText(file);
  });
}

function submitQuiz() {
  if (QUIZ_SUBMITTED) return;
  QUIZ_SUBMITTED = true;

  let correct = 0;
  const total = QUIZ_DATA.length;

  QUIZ_DATA.forEach((q, i) => {
    let userAnswer = '';
    let isCorrect = false;
    const corrEl = document.querySelector(`[data-corr="${i}"]`);

    if (q.type === 'mcq') {
      const sel = document.querySelector(`.mcq-opt[data-qi="${i}"].selected`);
      userAnswer = sel ? sel.getAttribute('data-val') : '';
      isCorrect = userAnswer === q.answer;

      // Highlight correct/wrong
      document.querySelectorAll(`.mcq-opt[data-qi="${i}"]`).forEach(o => {
        if (o.getAttribute('data-val') === q.answer) o.classList.add('correct');
        else if (o.classList.contains('selected')) o.classList.add('wrong');
      });
    } else {
      const input = document.querySelector(`.fill-input[data-qi="${i}"]`);
      userAnswer = input ? input.value.trim().toLowerCase() : '';
      isCorrect = userAnswer === q.answer.toLowerCase() ||
                  userAnswer.replace(/['']/g, "'") === q.answer.replace(/['']/g, "'").toLowerCase();
      if (input) {
        input.classList.add(isCorrect ? 'correct' : 'wrong');
        input.readOnly = true;
      }
    }

    if (isCorrect) {
      correct++;
      if (corrEl) { corrEl.style.display = 'block'; corrEl.innerHTML = '✅ Correct!'; corrEl.style.color = 'var(--success)'; }
    } else {
      if (corrEl) { corrEl.style.display = 'block'; corrEl.innerHTML = `❌ Answer: <strong>${q.answer}</strong>`; corrEl.style.color = 'var(--error)'; }
    }

    // Update SRS for this card
    const score = isCorrect ? 4 : 1;
    if (q.cardId && APP_STATE.cards[q.cardId]) {
      sm2Update(APP_STATE.cards[q.cardId], score);
    }

    if (isCorrect) APP_STATE.total_correct++;
    else APP_STATE.total_wrong++;
  });

  // Save lesson history
  const pct = Math.round(correct / total * 100);
  const ti = APP_STATE.current_topic_index;
  const topic = ti < CURRICULUM.length ? CURRICULUM[ti] : null;

  APP_STATE.lesson_history.push({
    date: today(),
    topic: topic ? topic.id : 'review',
    position: APP_STATE.current_position,
    quiz_score: pct
  });

  // Advance curriculum
  if (topic && !TODAY_DONE) {
    APP_STATE.current_position++;
    if (APP_STATE.current_position >= 3) {
      APP_STATE.current_position = 0;
      APP_STATE.current_topic_index++;
      // Init new topic cards
      if (APP_STATE.current_topic_index < CURRICULUM.length) {
        initCards(APP_STATE, APP_STATE.current_topic_index);
      }
    }
  }

  // Update streak
  if (APP_STATE.last_active !== today()) {
    const diff = APP_STATE.last_active ? daysBetween(APP_STATE.last_active, today()) : 0;
    APP_STATE.streak = (diff <= 1) ? APP_STATE.streak + 1 : 1;
  }
  APP_STATE.last_active = today();

  // Update weaknesses
  if (topic) {
    const cat = topic.category;
    const catCards = Object.values(APP_STATE.cards).filter(c => c.category === cat);
    const catTotal = catCards.reduce((s, c) => s + c.times_correct + c.times_wrong, 0);
    const catCorrect = catCards.reduce((s, c) => s + c.times_correct, 0);
    APP_STATE.weaknesses[cat] = catTotal > 0 ? catCorrect / catTotal : 0;
  }

  saveState(APP_STATE);
  updateHeader();

  // Replace submit button with results
  const btn = $('submitQuiz');
  if (btn) btn.remove();

  const resultsHtml = `
    <div class="results-card fade-in">
      <div class="results-score">${correct}/${total}</div>
      <div class="results-label">${pct >= 80 ? 'Excellent ! 🎉' : pct >= 60 ? 'Pas mal ! 👍' : 'Keep practicing! 💪'}</div>
      <div class="results-details">
        <p>📊 Score: <span class="gold">${pct}%</span></p>
        <p>🔥 Streak: <span class="gold">${APP_STATE.streak} day${APP_STATE.streak !== 1 ? 's' : ''}</span></p>
        ${topic ? `<p>📖 Next: <span class="gold">${APP_STATE.current_topic_index < CURRICULUM.length ? CURRICULUM[APP_STATE.current_topic_index].name + ' — ' + ['Intro','Deep Dive','Practice'][APP_STATE.current_position] : 'Reviews only'}</span></p>` : ''}
        <p>📅 Come back tomorrow for more!</p>
      </div>
    </div>
    <button class="btn-primary" id="doneBtn" style="background:linear-gradient(135deg,var(--success),#388e3c);">Done ✅</button>`;

  main().insertAdjacentHTML('beforeend', resultsHtml);
  document.querySelector('.results-card').scrollIntoView({ behavior: 'smooth' });
}

function exportData() {
  const blob = new Blob([JSON.stringify(APP_STATE, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `french-tutor-backup-${today()}.json`;
  a.click(); URL.revokeObjectURL(url);
}

// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
